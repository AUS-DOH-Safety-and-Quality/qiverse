
on:
  push:
    branches: [main, workflow-nested]
  pull_request:
    branches: [main]

name: R-CMD-check.yaml

permissions: read-all

jobs:
  detect-directory-changes:
    name: "Check which packages have changed"
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files_ignore: .github/**

      - name: Detect changed directories
        id: detect
        run: |
          echo "::set-output name=changed::$(echo '${{ steps.changed-files.outputs.all_changed_files  }}' | jq -r 'split(",") | map(select(. | startswith("qiverse"))) | unique | map(select(length > 0))')"
        shell: bash

      - name: Echo changed directories
        run: |
          echo "Changed directories: ${{ steps.detect.outputs.changed }}"
        shell: bash

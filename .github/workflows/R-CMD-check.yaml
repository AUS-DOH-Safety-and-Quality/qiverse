
on:
  push:
    branches: [main, fix-notes]
  pull_request:
    branches: [main]

name: R-CMD-check.yaml

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    name: ubuntu-latest ('release')

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: [qiverse, qiverse.azure, qiverse.data, qiverse.powerbi, qiverse.qimatrix, qiverse.qimisc, qiverse.qipatterns, qiverse.qiplotly, qiverse.sharepoint, qiverse.snowflake ]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
          extra-repositories: 'https://aus-doh-safety-and-quality.r-universe.dev/'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: ${{ matrix.package }}
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: ${{ matrix.package }}
          upload-snapshots: true
